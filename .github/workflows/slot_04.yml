name: Slot 04

on:
  workflow_dispatch:
    inputs:
      replicas_json:
        description: "JSON array of relay replicas, e.g. [{\"worker_id\":\"relay-a-g01-...\",\"shard\":\"{...}\"}]"
        required: true
        type: string
      log_level:
        description: "Application log level"
        required: false
        type: string
        default: "INFO"
      worker_import_debug:
        description: "Enable verbose worker import diagnostics"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: slot-04-relay-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  work:
    name: ${{ matrix.replica.worker_id }}
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        replica: ${{ fromJSON(inputs.replicas_json) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync relay worker dependencies
        run: uv sync --project "$GITHUB_WORKSPACE/tasks" --frozen

      - name: Install relay npm dependencies
        run: npm ci --no-fund --no-audit
        working-directory: ${{ github.workspace }}/tasks/shared-state-relay

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Install gost
        run: |
          python - <<'PY'
          import io
          import json
          import os
          import stat
          import tarfile
          import urllib.request

          release_url = "https://api.github.com/repos/go-gost/gost/releases/latest"
          request = urllib.request.Request(
              release_url,
              headers={
                  "accept": "application/vnd.github+json",
                  "user-agent": "slot-04-gost-installer",
              },
          )
          with urllib.request.urlopen(request) as response:
              release = json.load(response)

          asset_url = ""
          for asset in release.get("assets", []):
              name = str(asset.get("name", "") or "")
              if name.startswith("gost_") and name.endswith("_linux_amd64.tar.gz"):
                  asset_url = str(asset.get("browser_download_url", "") or "")
                  break
          if not asset_url:
              raise SystemExit("could not find gost Linux amd64 release asset")

          with urllib.request.urlopen(asset_url) as response:
              archive = response.read()

          member_name = ""
          member_data = b""
          with tarfile.open(fileobj=io.BytesIO(archive), mode="r:gz") as tar:
              for member in tar.getmembers():
                  if not member.isfile():
                      continue
                  if member.name == "gost" or member.name.endswith("/gost"):
                      extracted = tar.extractfile(member)
                      if extracted is None:
                          continue
                      member_name = member.name
                      member_data = extracted.read()
                      break
          if not member_data:
              raise SystemExit("could not extract gost binary from release archive")

          destination = "/usr/local/bin/gost"
          with open(destination, "wb") as handle:
              handle.write(member_data)
          os.chmod(
              destination,
              stat.S_IRUSR
              | stat.S_IWUSR
              | stat.S_IXUSR
              | stat.S_IRGRP
              | stat.S_IXGRP
              | stat.S_IROTH
              | stat.S_IXOTH,
          )
          print(f"installed {member_name} to {destination}")
          PY
          gost -V || gost -h >/dev/null

      - name: Run relay worker
        run: uv run --project "$GITHUB_WORKSPACE/tasks" -m src worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHO_TOKEN: ${{ secrets.GHO_TOKEN }}
          WORKER_TYPE: "shared_state_relay"
          WORKER_TIMEOUT_MINUTES: "330"
          WORKER_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.replica.worker_id }}
          WORKER_ID: ${{ matrix.replica.worker_id }}
          SHARD: ${{ matrix.replica.shard }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_JOB_NAME: ${{ matrix.replica.worker_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          DB_ENCRYPTION_KEY: ${{ secrets.DB_ENCRYPTION_KEY }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          APP_LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}
          WORKER_IMPORT_DEBUG: ${{ inputs.worker_import_debug || 'false' }}
          RELAY_USERNAME: ${{ secrets.RELAY_USERNAME }}
          RELAY_PASSWORD: ${{ secrets.RELAY_PASSWORD }}
          RELAY_CLOUDFLARE_TUNNEL_TOKEN: ${{ matrix.replica.handoff_target_id == 'relay-a' && secrets.RELAY_A_TUNNEL_TOKEN || matrix.replica.handoff_target_id == 'relay-b' && secrets.RELAY_B_TUNNEL_TOKEN || secrets.RELAY_TUNNEL_TOKEN }}
