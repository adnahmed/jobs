name: Slot 04

on:
  workflow_dispatch:
    inputs:
      replicas_json:
        description: "JSON array of relay replicas, e.g. [{\"worker_id\":\"relay-a-g01-...\",\"shard\":\"{...}\"}]"
        required: true
        type: string
      log_level:
        description: "Application log level"
        required: false
        type: string
        default: "INFO"
      worker_import_debug:
        description: "Enable verbose worker import diagnostics"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: slot-04-relay-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  work:
    name: ${{ matrix.replica.worker_id }}
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        replica: ${{ fromJSON(inputs.replicas_json) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync relay worker dependencies
        run: uv sync --project "$GITHUB_WORKSPACE/tasks" --frozen

      - name: Install relay npm dependencies
        run: npm install --no-fund --no-audit
        working-directory: ${{ github.workspace }}/tasks/shared-state-relay

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Run relay worker
        run: uv run --project "$GITHUB_WORKSPACE/tasks" -m src worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHO_TOKEN: ${{ secrets.GHO_TOKEN }}
          WORKER_TYPE: "shared_state_relay"
          WORKER_TIMEOUT_MINUTES: "330"
          WORKER_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.replica.worker_id }}
          WORKER_ID: ${{ matrix.replica.worker_id }}
          SHARD: ${{ matrix.replica.shard }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_JOB_NAME: ${{ matrix.replica.worker_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          DB_ENCRYPTION_KEY: ${{ secrets.DB_ENCRYPTION_KEY }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          APP_LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}
          WORKER_IMPORT_DEBUG: ${{ inputs.worker_import_debug || 'false' }}
          RELAY_CLOUDFLARE_TUNNEL_TOKEN: ${{ matrix.replica.handoff_target_id == 'relay-a' && secrets.RELAY_A_TUNNEL_TOKEN || matrix.replica.handoff_target_id == 'relay-b' && secrets.RELAY_B_TUNNEL_TOKEN || secrets.RELAY_TUNNEL_TOKEN }}
