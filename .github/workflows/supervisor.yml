name: Supervisor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

# Block fork PRs from triggering scheduled runs
# (schedule events always run on default branch of the base repo)

permissions:
  contents: write
  actions: write
  packages: read

concurrency:
  group: supervisor
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHO_TOKEN: ${{ secrets.GHO_TOKEN }}
  DISPATCH_TOKEN: ${{ secrets.DISPATCH_PAT }}
  DEFAULT_WORKFLOW_REF: ${{ github.event.repository.default_branch }}
  GITHUB_PLAN: ${{ vars.GITHUB_PLAN || 'free' }}
  SUPERVISOR_MAX_CONCURRENT_JOBS: ${{ vars.SUPERVISOR_MAX_CONCURRENT_JOBS || '' }}
  SUPERVISOR_RESERVED_CONCURRENCY: ${{ vars.SUPERVISOR_RESERVED_CONCURRENCY || '1' }}
  RELAY_LANE_A_PEER_URL: ${{ vars.RELAY_LANE_A_PEER_URL || '' }}
  RELAY_LANE_B_PEER_URL: ${{ vars.RELAY_LANE_B_PEER_URL || '' }}

jobs:
  supervise:
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor || github.event_name == 'schedule'
    container:
      image: ${{ vars.PRIVATE_RUNTIME_IMAGE || format('ghcr.io/{0}/jobs-private-runtime:latest', github.repository_owner) }}
      credentials:
        username: ${{ vars.GHCR_USERNAME || github.repository_owner }}
        password: ${{ secrets.GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run supervisor
        run: python -m src supervisor
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
