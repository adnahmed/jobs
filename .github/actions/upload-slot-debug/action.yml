name: Upload Slot Debug Artifacts
description: Upload shared Playwright and agent debug artifacts.

inputs:
  artifact-name:
    description: Artifact name to publish
    required: true
  artifact-path:
    description: Glob for debug artifacts
    required: false
    default: /tmp/playwright-debug/**

runs:
  using: composite
  steps:
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}
        if-no-files-found: ignore
